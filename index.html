<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DigitalAvatar.ai</title>
<style>
  :root { --bg:#05101a; --panel:#0a1925; --line:#1d3a4a; --txt:#dff3ff; --muted:#7fa8bb; --accent:#5fd0ff; --ok:#6ce6a2; --warn:#ffce6b; --err:#ff8a7a; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; background:radial-gradient(circle at 30% -10%, #0c2840, var(--bg) 55%); color:var(--txt); font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; display:flex; flex-direction:column; align-items:center; gap:16px; padding:24px 18px; }
  .toggles { position:fixed; top:14px; right:16px; display:flex; gap:10px; z-index:10; }
  .seg { display:flex; gap:4px; }
  .seg button { padding:5px 11px; font-size:.72rem; border-radius:8px; border:1px solid var(--line); background:#06121c; color:var(--muted); cursor:pointer; }
  .seg button.on { border-color:var(--accent); color:var(--accent); background:#0e2a3a; }
  h1 { font-size:1.06rem; margin:0; letter-spacing:.04em; text-align:center; }
  h1 b { color:var(--accent); }
  .sub { color:var(--muted); font-size:.72rem; margin:0; text-align:center; max-width:560px; }

  .stage { position:relative; width:min(420px,90vw); aspect-ratio:3/4; border-radius:18px; }
  .stage video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; border-radius:18px; border:1px solid var(--line); background:#000; box-shadow:0 18px 50px rgba(0,0,0,.55); }
  .inset { position:absolute; right:12px; bottom:12px; width:132px; height:132px; border-radius:16px; overflow:hidden; border:1.5px solid var(--accent); background:radial-gradient(circle at 50% 32%, #0e2233, #06121c 72%); box-shadow:0 10px 26px rgba(0,0,0,.55), 0 0 0 4px rgba(5,16,26,.6); }
  .inset canvas { width:100%; height:100%; display:block; }
  .inset .live { position:absolute; top:7px; left:8px; font-size:.56rem; letter-spacing:.12em; color:var(--muted); text-transform:uppercase; display:flex; align-items:center; gap:5px; }
  .inset .live i { width:7px; height:7px; border-radius:50%; background:#39506a; display:inline-block; }
  .inset.on { border-color:var(--ok); }
  .inset.on .live { color:var(--ok); }
  .inset.on .live i { background:var(--ok); box-shadow:0 0 8px var(--ok); animation:pulse 1.1s infinite; }
  @keyframes pulse { 50% { opacity:.35; } }
  .sound { position:absolute; left:12px; bottom:12px; font-size:.66rem; padding:6px 11px; border-radius:8px; border:1px solid var(--line); background:rgba(6,18,28,.7); color:var(--muted); cursor:pointer; }

  .card { width:min(560px,100%); background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:18px 20px; box-shadow:0 24px 60px rgba(0,0,0,.5); }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  button.act { background:linear-gradient(180deg,#0e3550,#0a2335); color:var(--accent); border:1px solid #2a7fa6; border-radius:10px; padding:10px 16px; font-family:inherit; font-size:.84rem; font-weight:600; cursor:pointer; }
  button.act.alt { background:#06121c; color:var(--muted); border-color:var(--line); }
  button.act:hover:not(:disabled) { border-color:var(--accent); box-shadow:0 0 14px rgba(95,208,255,.25); }
  button.act:disabled { opacity:.45; cursor:default; }
  label { display:block; font-size:.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin:14px 0 5px; }
  select, textarea { width:100%; background:#06121c; color:var(--txt); border:1px solid var(--line); border-radius:10px; padding:10px 12px; font-family:inherit; font-size:.86rem; }
  textarea { resize:vertical; min-height:50px; }
  .status { font-size:.74rem; margin-top:10px; min-height:18px; }
  .status.ok { color:var(--ok); } .status.warn { color:var(--warn); } .status.err { color:var(--err); }
  .answer { font-size:.95rem; line-height:1.5; margin-top:8px; }
  .foot { margin-top:14px; font-size:.66rem; color:var(--muted); }
  a { color:var(--accent); }
</style>
</head>
<body>
  <div class="toggles">
    <div class="seg" id="genSeg"><button id="genF">♀</button><button id="genM">♂</button></div>
    <div class="seg" id="langSeg"><button id="langEs">ES</button><button id="langEn">EN</button></div>
  </div>

  <h1 id="appTitle"></h1>
  <p class="sub" id="sub"></p>

  <div class="stage">
    <video id="heroVid" autoplay muted loop playsinline preload="metadata"></video>
    <button class="sound" id="soundBtn"></button>
    <div class="inset" id="inset">
      <span class="live"><i></i><span id="liveTxt"></span></span>
      <canvas id="face"></canvas>
    </div>
  </div>

  <div class="card">
    <div class="row">
      <button class="act" id="btnAsk"></button>
      <button class="act alt" id="btnDemo"></button>
    </div>
    <label for="loc" id="locLabel"></label>
    <select id="loc"></select>
    <label for="q" id="qLabel"></label>
    <textarea id="q"></textarea>
    <div class="answer" id="answer"></div>
    <div class="status" id="status"></div>
    <p class="foot" id="foot"></p>
  </div>

<script src="lipsync-avatar.js"></script>
<script>
const API = 'https://omnipublicity-api.csilvasantin.workers.dev';
const $ = id => document.getElementById(id);

const T = {
  es: {
    htmlLang:'es', title:'<b>DigitalAvatar</b>.ai', heroSound:'🔊 Sonido del vídeo', heroMute:'🔇 Silenciar',
    sub:'El vídeo es la cara foto-real; el recuadro EN VIVO es el avatar que hace lip-sync de la respuesta real (Grok + ElevenLabs), offline.',
    live:'en vivo', speaking:'hablando', ask:'🗣 Preguntar y hablar', demo:'▶ Demo lip-sync',
    locLabel:'Xpacio (punto de Admira.app)', qLabel:'Pregunta al avatar',
    qPlaceholder:'¿Tenéis tabaco de liar? ¿Quién está hoy en caja?', qDefault:'¿Tenéis tabaco de liar?',
    loadingPts:'— cargando puntos… —', noPts:'(no hay puntos en el KV)', errPts:'(error cargando puntos)',
    writeQ:'Escribe una pregunta.', thinking:'Pensando…',
    okVoice:'✓ Respuesta con voz — el avatar hace lip-sync del MP3 real.',
    noVoice:'✓ Respuesta (sin voz: ', xai:'⚠️ Falta la clave xAI en el worker. El lip-sync ya va con ▶ Demo.',
    net:'❌ Error de red: ', demoMsg:'Demo de lip-sync (sintético) en el recuadro.', speechLang:'es-ES',
    foot:'Lip-sync 2D propio, en el navegador, sin coste por uso. Mismo cerebro y voz que el gemelo de <a href="https://www.admira.app">Admira.app</a>.',
  },
  en: {
    htmlLang:'en', title:'<b>DigitalAvatar</b>.ai', heroSound:'🔊 Video sound', heroMute:'🔇 Mute',
    sub:'The video is the photoreal face; the LIVE inset is the avatar that lip-syncs the real reply (Grok + ElevenLabs), offline.',
    live:'live', speaking:'speaking', ask:'🗣 Ask & speak', demo:'▶ Lip-sync demo',
    locLabel:'Xpacio (Admira.app location)', qLabel:'Ask the avatar',
    qPlaceholder:"Do you sell rolling tobacco? Who's at the till today?", qDefault:'Do you sell rolling tobacco?',
    loadingPts:'— loading locations… —', noPts:'(no locations in KV)', errPts:'(error loading locations)',
    writeQ:'Type a question.', thinking:'Thinking…',
    okVoice:'✓ Reply with voice — the avatar lip-syncs the real MP3.',
    noVoice:'✓ Reply (no voice: ', xai:'⚠️ The worker is missing the xAI key. Lip-sync already works via ▶ Demo.',
    net:'❌ Network error: ', demoMsg:'Lip-sync demo (synthetic) in the inset.', speechLang:'en-US',
    foot:'Own 2D lip-sync, in the browser, no per-use cost. Same brain & voice as the <a href="https://www.admira.app">Admira.app</a> twin.',
  },
};

let LANG = (localStorage.getItem('da_lang')==='en') ? 'en'
  : (localStorage.getItem('da_lang')==='es') ? 'es'
  : ((navigator.language||'es').toLowerCase().startsWith('en') ? 'en' : 'es');
let GENDER = (localStorage.getItem('da_gender')==='male') ? 'male' : 'female';
const VIDEO_AVAILABLE = { 'female-es':1, 'female-en':1, 'male-es':1, 'male-en':1 };
function videoKey() {
  const k = GENDER+'-'+LANG;
  if (VIDEO_AVAILABLE[k]) return k;
  if (VIDEO_AVAILABLE[GENDER+'-es']) return GENDER+'-es';
  return 'female-'+LANG;
}

const avatar = new LipSyncAvatar($('face'), { accent:'#5fd0ff', gender:GENDER });
avatar.start();

let askAudio=null, synthSrc=null;
function setLive(on){ $('inset').classList.toggle('on',on); $('liveTxt').textContent = on ? T[LANG].speaking : T[LANG].live; }
function setStatus(m,c){ const s=$('status'); s.innerHTML=m||''; s.className='status'+(c?' '+c:''); }

function setHeroVideo(){
  const hv=$('heroVid'), k=videoKey(), want='assets/avatar-'+k+'.mp4';
  if(!hv.src || !hv.src.endsWith(want)){ hv.src=want; hv.poster='assets/avatar-'+k+'-poster.jpg'; hv.load(); hv.play().catch(()=>{}); }
  $('soundBtn').textContent = hv.muted ? T[LANG].heroSound : T[LANG].heroMute;
}
function applyGender(g){ GENDER=(g==='male')?'male':'female'; try{localStorage.setItem('da_gender',GENDER);}catch(e){}
  avatar.setGender(GENDER); $('genF').classList.toggle('on',GENDER==='female'); $('genM').classList.toggle('on',GENDER==='male'); setHeroVideo(); }
function applyLang(l){ LANG=(l==='en')?'en':'es'; const t=T[LANG]; try{localStorage.setItem('da_lang',LANG);}catch(e){}
  document.documentElement.lang=t.htmlLang;
  $('appTitle').innerHTML=t.title; $('sub').textContent=t.sub;
  $('btnAsk').textContent=t.ask; $('btnDemo').textContent=t.demo;
  $('locLabel').textContent=t.locLabel; $('qLabel').textContent=t.qLabel;
  const q=$('q'); q.placeholder=t.qPlaceholder;
  if(!q.value.trim()||q.value===T.es.qDefault||q.value===T.en.qDefault) q.value=t.qDefault;
  $('foot').innerHTML=t.foot; $('liveTxt').textContent = $('inset').classList.contains('on')?t.speaking:t.live;
  $('langEs').classList.toggle('on',LANG==='es'); $('langEn').classList.toggle('on',LANG==='en');
  setHeroVideo();
}

$('soundBtn').onclick=()=>{ const hv=$('heroVid'); hv.muted=!hv.muted; if(!hv.muted){hv.currentTime=0;hv.play().catch(()=>{});} $('soundBtn').textContent=hv.muted?T[LANG].heroSound:T[LANG].heroMute; };
$('genF').onclick=()=>applyGender('female'); $('genM').onclick=()=>applyGender('male');
$('langEs').onclick=()=>applyLang('es'); $('langEn').onclick=()=>applyLang('en');

fetch(API+'/locations',{cache:'no-store'}).then(r=>r.json()).then(d=>{
  const list=(d&&d.locations)||[]; const sel=$('loc'); sel.innerHTML='';
  if(!list.length){ sel.innerHTML='<option value="">'+T[LANG].noPts+'</option>'; return; }
  list.forEach(l=>{ const o=document.createElement('option'); o.value=l.id; o.textContent=(l.name||l.id)+(l.addr?' · '+l.addr:''); sel.appendChild(o); });
}).catch(()=>{ $('loc').innerHTML='<option value="">'+T[LANG].errPts+'</option>'; });

function stopAudio(){ if(synthSrc){try{synthSrc.stop();}catch(e){} synthSrc=null;} if(askAudio){try{askAudio.pause();}catch(e){}} setLive(false); }

function playDemo(){
  stopAudio();
  const ctx=avatar.ensureAudio(), sr=ctx.sampleRate, dur=3.0;
  const buf=ctx.createBuffer(1,Math.floor(dur*sr),sr), d=buf.getChannelData(0); let i=0;
  while(i<d.length){
    const len=Math.floor((0.12+Math.random()*0.14)*sr), gap=Math.floor((0.03+Math.random()*0.07)*sr);
    const f0=110+Math.random()*60,f1=500+Math.random()*500,f2=1200+Math.random()*1800;
    for(let j=0;j<len&&i<d.length;j++,i++){ const t=j/sr,p=j/len,env=Math.sin(Math.PI*p);
      d[i]=(0.6*Math.sin(2*Math.PI*f0*t)+0.5*Math.sin(2*Math.PI*f1*t)+0.35*Math.sin(2*Math.PI*f2*t)+0.08*(Math.random()*2-1))*env*0.5; }
    i+=gap;
  }
  const src=ctx.createBufferSource(); src.buffer=buf; avatar.connectSource(src,true);
  src.onended=()=>setLive(false); src.start(); synthSrc=src; setLive(true); setStatus(T[LANG].demoMsg,'ok');
}

async function ask(){
  stopAudio(); const t=T[LANG]; const question=$('q').value.trim();
  if(!question){ setStatus(t.writeQ,'warn'); return; }
  $('btnAsk').disabled=true; $('answer').textContent=''; setStatus(t.thinking);
  try{
    const res=await fetch(API+'/metahuman/ask',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({loc:$('loc').value,question,lang:LANG,voice:true})});
    const j=await res.json().catch(()=>({}));
    if(j.ok){
      $('answer').innerHTML='🤖 '+(j.answer||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
      if(j.audioBase64){
        askAudio=new Audio('data:'+(j.mime||'audio/mpeg')+';base64,'+j.audioBase64);
        avatar.connectAudioElement(askAudio); askAudio.onended=()=>setLive(false);
        await askAudio.play(); setLive(true); setStatus(t.okVoice,'ok');
      } else setStatus(t.noVoice+(j.voiceNote||'TTS n/a')+')','warn');
    } else if(j.error==='xai_key_not_set'){ setStatus(t.xai,'warn'); }
    else setStatus('❌ '+(j.error||('HTTP '+res.status)),'err');
  }catch(e){ setStatus(t.net+(e.message||e),'err'); }
  finally{ $('btnAsk').disabled=false; }
}

$('btnDemo').onclick=playDemo; $('btnAsk').onclick=ask;
$('q').addEventListener('keydown',e=>{ if(e.key==='Enter'&&(e.metaKey||e.ctrlKey)) ask(); });
applyGender(GENDER); applyLang(LANG);
</script>
</body>
</html>
