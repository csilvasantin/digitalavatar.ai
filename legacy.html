<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DigitalAvatar.ai</title>
<style>
  :root { --bg:#05101a; --panel:#0a1925; --line:#1d3a4a; --txt:#dff3ff; --muted:#7fa8bb; --accent:#5fd0ff; --ok:#6ce6a2; --warn:#ffce6b; --err:#ff8a7a; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; background:radial-gradient(circle at 30% -10%, #0c2840, var(--bg) 55%); color:var(--txt); font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; display:flex; flex-direction:column; align-items:center; gap:16px; padding:24px 18px; }
  .toggles { position:fixed; top:14px; right:16px; display:flex; gap:10px; z-index:10; }
  .seg { display:flex; gap:4px; }
  .seg button { padding:5px 12px; font-size:.72rem; border-radius:8px; border:1px solid var(--line); background:#06121c; color:var(--muted); cursor:pointer; }
  .seg button.on { border-color:var(--accent); color:var(--accent); background:#0e2a3a; }
  h1 { font-size:1.06rem; margin:0; letter-spacing:.04em; text-align:center; }
  h1 b { color:var(--accent); }
  .sub { color:var(--muted); font-size:.72rem; margin:0; text-align:center; max-width:620px; }

  .duo { display:flex; gap:16px; flex-wrap:wrap; justify-content:center; width:100%; }
  .stage { position:relative; width:min(330px,44vw); aspect-ratio:3/4; border-radius:18px; }
  @media (max-width:680px){ .stage { width:min(420px,90vw); } }
  .stage video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; border-radius:18px; border:1px solid var(--line); background:#000; box-shadow:0 18px 50px rgba(0,0,0,.55); }
  .who { position:absolute; top:10px; left:12px; font-size:.62rem; letter-spacing:.12em; text-transform:uppercase; color:var(--accent); background:rgba(6,18,28,.66); padding:3px 8px; border-radius:7px; z-index:4; }
  .inset { position:absolute; right:10px; bottom:10px; width:112px; height:112px; border-radius:14px; overflow:hidden; border:1.5px solid var(--accent); background:radial-gradient(circle at 50% 32%, #0e2233, #06121c 72%); box-shadow:0 10px 26px rgba(0,0,0,.55), 0 0 0 4px rgba(5,16,26,.6); z-index:5; }
  .inset canvas { width:100%; height:100%; display:block; }
  .inset .live { position:absolute; top:6px; left:7px; font-size:.52rem; letter-spacing:.1em; color:var(--muted); text-transform:uppercase; display:flex; align-items:center; gap:4px; }
  .inset .live i { width:6px; height:6px; border-radius:50%; background:#39506a; display:inline-block; }
  .inset.on { border-color:var(--ok); }
  .inset.on .live { color:var(--ok); }
  .inset.on .live i { background:var(--ok); box-shadow:0 0 8px var(--ok); animation:pulse 1.1s infinite; }
  @keyframes pulse { 50% { opacity:.35; } }
  .sound { position:absolute; left:10px; bottom:10px; font-size:.62rem; padding:5px 9px; border-radius:8px; border:1px solid var(--line); background:rgba(6,18,28,.72); color:var(--muted); cursor:pointer; z-index:4; }
  /* Overlay pixelado: por defecto tapa el vídeo (parado) y oculta la calidad real */
  .pixel { position:absolute; inset:0; width:100%; height:100%; image-rendering:pixelated; border-radius:18px; cursor:pointer; z-index:2; }
  .pixel.hidden { display:none; }
  .reveal { position:absolute; left:50%; top:46%; transform:translate(-50%,-50%); z-index:3; min-width:58px; padding:10px 8px 8px; border-radius:14px; border:1.5px solid var(--accent); background:rgba(6,18,28,.74); color:var(--accent); cursor:pointer; box-shadow:0 6px 20px rgba(0,0,0,.5); text-align:center; line-height:1; }
  .reveal .play { font-size:1.2rem; }
  .reveal small { display:block; font-size:.5rem; letter-spacing:.12em; color:var(--muted); margin-top:4px; text-transform:uppercase; }
  .reveal:hover { box-shadow:0 0 16px rgba(95,208,255,.4); }
  .reveal.hidden { display:none; }

  .card { width:min(680px,100%); background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:18px 20px; box-shadow:0 24px 60px rgba(0,0,0,.5); }
  /* Avatares vectoriales reubicados DENTRO de la tarjeta (no pisan los vídeos) */
  .avatars { display:flex; gap:16px; justify-content:center; flex-wrap:wrap; margin-bottom:16px; }
  /* Cada avatar ocupa media tarjeta → queda centrado bajo su vídeo */
  .av { flex:1 1 0; max-width:332px; display:flex; flex-direction:column; align-items:center; gap:5px; cursor:pointer; opacity:.5; transition:opacity .2s; }
  @media (max-width:680px){ .av { max-width:none; } }
  .av.sel { opacity:1; }
  .av.sel .inset { box-shadow:0 10px 26px rgba(0,0,0,.55), 0 0 0 3px var(--accent); }
  .avatars .inset { position:relative; right:auto; bottom:auto; width:118px; height:118px; }
  .name { font-size:.62rem; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; }
  .pick { font-size:.56rem; color:var(--accent); letter-spacing:.1em; text-transform:uppercase; height:12px; visibility:hidden; }
  .av.sel .pick { visibility:visible; }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  button.act { background:linear-gradient(180deg,#0e3550,#0a2335); color:var(--accent); border:1px solid #2a7fa6; border-radius:10px; padding:10px 16px; font-family:inherit; font-size:.84rem; font-weight:600; cursor:pointer; }
  button.act.alt { background:#06121c; color:var(--muted); border-color:var(--line); }
  button.act:hover:not(:disabled) { border-color:var(--accent); box-shadow:0 0 14px rgba(95,208,255,.25); }
  button.act:disabled { opacity:.45; cursor:default; }
  label { display:block; font-size:.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin:14px 0 5px; }
  select, textarea { width:100%; background:#06121c; color:var(--txt); border:1px solid var(--line); border-radius:10px; padding:10px 12px; font-family:inherit; font-size:.86rem; }
  textarea { resize:vertical; min-height:50px; }
  .status { font-size:.74rem; margin-top:10px; min-height:18px; }
  .status.ok { color:var(--ok); } .status.warn { color:var(--warn); } .status.err { color:var(--err); }
  .answer { font-size:.95rem; line-height:1.5; margin-top:8px; }
  .foot { margin-top:14px; font-size:.66rem; color:var(--muted); }
  a { color:var(--accent); }
</style>
</head>
<body>
  <div class="toggles">
    <div class="seg" id="langSeg"><button id="langEs">ES</button><button id="langEn">EN</button></div>
  </div>

  <h1 id="appTitle"></h1>
  <p class="sub" id="sub"></p>

  <div class="duo">
    <div class="stage">
      <span class="who" id="whoF"></span>
      <video id="vidF" muted loop playsinline preload="metadata"></video>
      <canvas class="pixel" id="pxF"></canvas>
      <button class="reveal" id="revF"><span class="play">▶</span><small id="revFt"></small></button>
      <button class="sound" id="sndF"></button>
    </div>
    <div class="stage">
      <span class="who" id="whoM"></span>
      <video id="vidM" muted loop playsinline preload="metadata"></video>
      <canvas class="pixel" id="pxM"></canvas>
      <button class="reveal" id="revM"><span class="play">▶</span><small id="revMt"></small></button>
      <button class="sound" id="sndM"></button>
    </div>
  </div>

  <div class="card">
    <div class="avatars">
      <div class="av" id="avF"><div class="inset" id="insF"><span class="live"><i></i><span class="lt"></span></span><canvas id="faceF"></canvas></div><div class="name" id="nameF"></div><div class="pick" id="pickF"></div></div>
      <div class="av" id="avM"><div class="inset" id="insM"><span class="live"><i></i><span class="lt"></span></span><canvas id="faceM"></canvas></div><div class="name" id="nameM"></div><div class="pick" id="pickM"></div></div>
    </div>
    <div class="row">
      <button class="act" id="btnAsk"></button>
      <button class="act alt" id="btnDemo"></button>
    </div>
    <label for="loc" id="locLabel"></label>
    <select id="loc"></select>
    <label for="q" id="qLabel"></label>
    <textarea id="q"></textarea>
    <div class="answer" id="answer"></div>
    <div class="status" id="status"></div>
    <p class="foot" id="foot"></p>
  </div>

<script src="lipsync-avatar.js"></script>
<script>
const API = 'https://omnipublicity-api.csilvasantin.workers.dev';
const $ = id => document.getElementById(id);

const T = {
  es: { htmlLang:'es', title:'<b>DigitalAvatar</b>.ai',
    sub:'Madre y padre a la vez, en el mismo idioma. Los vídeos salen parados y pixelados: pulsa ▶ para revelar la calidad real. El recuadro EN VIVO hace lip-sync de la respuesta (Grok + ElevenLabs), offline.',
    mother:'Madre', father:'Padre', live:'en vivo', speaking:'hablando',
    sound:'🔊 Sonido', mute:'🔇 Silenciar', reveal:'Revelar',
    ask:'🗣 Preguntar', demo:'▶ Demo lip-sync', replies:'Responde',
    locLabel:'Xpacio (punto de Admira.app)', qLabel:'Pregunta al avatar',
    qPlaceholder:'¿Cuánta gente vive en Madrid?', qDefault:'¿Cuánta gente vive en Madrid?',
    noPts:'(sin puntos en el KV)', errPts:'(error cargando puntos)',
    writeQ:'Escribe una pregunta.', thinking:'Pensando…',
    okVoice:'✓ Respuesta con voz — lip-sync del avatar seleccionado.',
    xai:'⚠️ Falta XAI_API_KEY en el worker. El lip-sync ya va con ▶ Demo.',
    net:'❌ Error de red: ', demoMsg:'Demo de lip-sync en los dos recuadros.', speechLang:'es-ES',
    foot:'Lip-sync 2D propio, en el navegador, sin coste por uso. Mismo cerebro y voz que el gemelo de <a href="https://www.admira.app">Admira.app</a>.',
  },
  en: { htmlLang:'en', title:'<b>DigitalAvatar</b>.ai',
    sub:'Mother and father at once, in the same language. Videos start paused & pixelated — press ▶ to reveal the real quality. The LIVE inset lip-syncs the reply (Grok + ElevenLabs), offline.',
    mother:'Mother', father:'Father', live:'live', speaking:'speaking',
    sound:'🔊 Sound', mute:'🔇 Mute', reveal:'Reveal',
    ask:'🗣 Ask', demo:'▶ Lip-sync demo', replies:'Replies',
    locLabel:'Xpacio (Admira.app location)', qLabel:'Ask the avatar',
    qPlaceholder:'How many people live in Madrid?', qDefault:'How many people live in Madrid?',
    noPts:'(no locations in KV)', errPts:'(error loading locations)',
    writeQ:'Type a question.', thinking:'Thinking…',
    okVoice:'✓ Reply with voice — the selected avatar lip-syncs.',
    xai:'⚠️ The worker is missing the xAI key. Lip-sync already works via ▶ Demo.',
    net:'❌ Network error: ', demoMsg:'Lip-sync demo in both insets.', speechLang:'en-US',
    foot:'Own 2D lip-sync, in the browser, no per-use cost. Same brain & voice as the <a href="https://www.admira.app">Admira.app</a> twin.',
  },
};

// Por defecto INGLÉS (salvo que el usuario ya eligiera ES antes).
let LANG = (localStorage.getItem('da_lang') === 'es') ? 'es' : 'en';
// Quién responde: madre por defecto; si seleccionas al padre, responde él.
let SPEAKER = (localStorage.getItem('da_speaker') === 'male') ? 'male' : 'female';
const VIDEO_AVAILABLE = { 'female-es':1, 'female-en':1, 'male-es':1, 'male-en':1 };
function vkey(gender){ const k=gender+'-'+LANG; return VIDEO_AVAILABLE[k] ? k : gender+'-es'; }

// Voces ElevenLabs por sexo×idioma.
const VOICES = {
  'female-es':'dNjJKg63Fr5AXwIdkATa', 'female-en':'qSeXEcewz7tA0Q0qk9fH',
  'male-es':'qUPtETgSYRhCRb2pfOla',   'male-en':'wAGzRVkxKEs8La0lmdrE',
};

const avatarF = new LipSyncAvatar($('faceF'), { accent:'#5fd0ff', gender:'female' });
const avatarM = new LipSyncAvatar($('faceM'), { accent:'#5fd0ff', gender:'male' });
avatarF.start(); avatarM.start();

let askAudio=null, synthF=null, synthM=null;
function setLiveF(on){ $('insF').classList.toggle('on',on); $('insF').querySelector('.lt').textContent = on?T[LANG].speaking:T[LANG].live; }
function setLiveM(on){ $('insM').classList.toggle('on',on); $('insM').querySelector('.lt').textContent = on?T[LANG].speaking:T[LANG].live; }
function setStatus(m,c){ const s=$('status'); s.innerHTML=m||''; s.className='status'+(c?' '+c:''); }

function setVideo(vid, gender){
  const k=vkey(gender), want='assets/avatar-'+k+'.mp4';
  if(!vid.src || !vid.src.endsWith(want)){ vid.src=want; vid.poster='assets/avatar-'+k+'-poster.jpg'; vid.load(); } // NO autoplay: arranca parado
}

// Dibuja el póster muy pixelado en el overlay (oculta el nivel de render real).
function drawPixel(canvas, gender){
  const k=vkey(gender), img=new Image();
  img.onload=()=>{
    const W=44, H=Math.round(W*4/3); // marco 3:4
    canvas.width=W; canvas.height=H;
    const ctx=canvas.getContext('2d'); ctx.imageSmoothingEnabled=false;
    const ar=img.width/img.height, car=W/H; let sw,sh,sx,sy;
    if(ar>car){ sh=img.height; sw=sh*car; sx=(img.width-sw)/2; sy=0; } // cover
    else { sw=img.width; sh=sw/car; sx=0; sy=(img.height-sh)/2; }
    ctx.drawImage(img, sx,sy,sw,sh, 0,0,W,H);
  };
  img.src='assets/avatar-'+k+'-poster.jpg';
}
// Estado por defecto de un stage: vídeo parado + overlay pixelado + botón ▶ visible.
function pixelState(which, gender){
  const vid=$('vid'+which), px=$('px'+which), rev=$('rev'+which);
  try{ vid.pause(); }catch(e){}
  drawPixel(px, gender);
  px.classList.remove('hidden'); rev.classList.remove('hidden');
  $('rev'+which+'t').textContent = T[LANG].reveal;
}
// Pulsar ▶ (o el overlay): reproduce y revela la calidad real.
function reveal(which){
  const vid=$('vid'+which), px=$('px'+which), rev=$('rev'+which);
  vid.play().catch(()=>{}); px.classList.add('hidden'); rev.classList.add('hidden');
}
$('revF').onclick=()=>reveal('F'); $('pxF').onclick=()=>reveal('F');
$('revM').onclick=()=>reveal('M'); $('pxM').onclick=()=>reveal('M');
function applyLang(l){
  LANG = (l==='es')?'es':'en'; const t=T[LANG];
  try{ localStorage.setItem('da_lang',LANG); }catch(e){}
  document.documentElement.lang=t.htmlLang;
  $('appTitle').innerHTML=t.title; $('sub').textContent=t.sub;
  $('whoF').textContent=t.mother; $('whoM').textContent=t.father;
  $('nameF').textContent=t.mother; $('nameM').textContent=t.father;
  $('btnAsk').textContent=t.ask; $('btnDemo').textContent=t.demo;
  $('locLabel').textContent=t.locLabel; $('qLabel').textContent=t.qLabel;
  const q=$('q'); q.placeholder=t.qPlaceholder;
  if(!q.value.trim()||q.value===T.es.qDefault||q.value===T.en.qDefault) q.value=t.qDefault;
  $('foot').innerHTML=t.foot;
  $('sndF').textContent=$('vidF').muted?t.sound:t.mute; $('sndM').textContent=$('vidM').muted?t.sound:t.mute;
  setLiveF($('insF').classList.contains('on')); setLiveM($('insM').classList.contains('on'));
  $('langEs').classList.toggle('on',LANG==='es'); $('langEn').classList.toggle('on',LANG==='en');
  setVideo($('vidF'),'female'); setVideo($('vidM'),'male');
  pixelState('F','female'); pixelState('M','male'); // por defecto: parados y pixelados
  applySpeaker(SPEAKER); // refresca resaltado + etiqueta "responde"
}

function bindSound(btn, vid){ btn.onclick=()=>{ vid.muted=!vid.muted; if(!vid.muted){vid.currentTime=0;vid.play().catch(()=>{});} btn.textContent=vid.muted?T[LANG].sound:T[LANG].mute; }; }
bindSound($('sndF'),$('vidF')); bindSound($('sndM'),$('vidM'));
$('langEs').onclick=()=>applyLang('es'); $('langEn').onclick=()=>applyLang('en');

// Selección de quién responde (clic en el avatar)
function applySpeaker(s){
  SPEAKER = (s==='male') ? 'male' : 'female';
  try{ localStorage.setItem('da_speaker',SPEAKER); }catch(e){}
  $('avF').classList.toggle('sel', SPEAKER==='female');
  $('avM').classList.toggle('sel', SPEAKER==='male');
  $('pickF').textContent = SPEAKER==='female' ? '▸ '+T[LANG].replies : '';
  $('pickM').textContent = SPEAKER==='male'   ? '▸ '+T[LANG].replies : '';
}
$('avF').onclick=()=>applySpeaker('female');
$('avM').onclick=()=>applySpeaker('male');

fetch(API+'/locations',{cache:'no-store'}).then(r=>r.json()).then(d=>{
  const list=(d&&d.locations)||[]; const sel=$('loc'); sel.innerHTML='';
  if(!list.length){ sel.innerHTML='<option value="">'+T[LANG].noPts+'</option>'; return; }
  list.forEach(l=>{ const o=document.createElement('option'); o.value=l.id; o.textContent=(l.name||l.id)+(l.addr?' · '+l.addr:''); sel.appendChild(o); });
}).catch(()=>{ $('loc').innerHTML='<option value="">'+T[LANG].errPts+'</option>'; });

function stopAll(){ if(askAudio){try{askAudio.pause();}catch(e){}} if(synthF){try{synthF.stop();}catch(e){}synthF=null;} if(synthM){try{synthM.stop();}catch(e){}synthM=null;} setLiveF(false); setLiveM(false); }

function babble(avatar, onend){
  const ctx=avatar.ensureAudio(), sr=ctx.sampleRate, dur=3.0;
  const buf=ctx.createBuffer(1,Math.floor(dur*sr),sr), d=buf.getChannelData(0); let i=0;
  while(i<d.length){
    const len=Math.floor((0.12+Math.random()*0.14)*sr), gap=Math.floor((0.03+Math.random()*0.07)*sr);
    const f0=110+Math.random()*60,f1=500+Math.random()*500,f2=1200+Math.random()*1800;
    for(let j=0;j<len&&i<d.length;j++,i++){ const t=j/sr,p=j/len,env=Math.sin(Math.PI*p);
      d[i]=(0.6*Math.sin(2*Math.PI*f0*t)+0.5*Math.sin(2*Math.PI*f1*t)+0.35*Math.sin(2*Math.PI*f2*t)+0.08*(Math.random()*2-1))*env*0.5; }
    i+=gap;
  }
  const src=ctx.createBufferSource(); src.buffer=buf; avatar.connectSource(src,true); src.onended=onend; src.start(); return src;
}
function playDemo(){ stopAll();
  synthF=babble(avatarF, ()=>setLiveF(false)); setLiveF(true);
  synthM=babble(avatarM, ()=>setLiveM(false)); setLiveM(true);
  setStatus(T[LANG].demoMsg,'ok');
}

// La madre responde (voz femenina del idioma). Solo su recuadro hace lip-sync.
async function ask(){
  stopAll(); const t=T[LANG]; const question=$('q').value.trim();
  if(!question){ setStatus(t.writeQ,'warn'); return; }
  $('btnAsk').disabled=true; $('answer').textContent=''; setStatus(t.thinking);
  try{
    const res=await fetch(API+'/metahuman/ask',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({loc:$('loc').value,question,lang:LANG,voice:true,voiceId:VOICES[SPEAKER+'-'+LANG]||''})});
    const j=await res.json().catch(()=>({}));
    if(j.ok){
      $('answer').innerHTML='🤖 '+(j.answer||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
      if(j.audioBase64){
        askAudio=new Audio('data:'+(j.mime||'audio/mpeg')+';base64,'+j.audioBase64);
        const av = SPEAKER==='female'?avatarF:avatarM;
        const setLive = SPEAKER==='female'?setLiveF:setLiveM;
        av.connectAudioElement(askAudio); askAudio.onended=()=>setLive(false);
        await askAudio.play(); setLive(true); setStatus(t.okVoice,'ok');
      } else setStatus('Sin audio.','warn');
    } else if(j.error==='xai_key_not_set'){ setStatus(t.xai,'warn'); }
    else setStatus('❌ '+(j.error||('HTTP '+res.status)),'err');
  }catch(e){ setStatus(t.net+(e.message||e),'err'); }
  finally{ $('btnAsk').disabled=false; }
}

$('btnDemo').onclick=playDemo; $('btnAsk').onclick=ask;
$('q').addEventListener('keydown',e=>{ if(e.key==='Enter'&&(e.metaKey||e.ctrlKey)) ask(); });
applyLang(LANG);
</script>
</body>
</html>
