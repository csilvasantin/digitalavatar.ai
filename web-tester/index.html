<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DigitalAvatar.ai · Laboratorio de lip-sync 2D</title>
<style>
  :root { --bg:#05101a; --panel:#0a1925; --line:#1d3a4a; --txt:#dff3ff; --muted:#7fa8bb; --accent:#5fd0ff; --ok:#6ce6a2; --warn:#ffce6b; --err:#ff8a7a; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; background:radial-gradient(circle at 30% -10%, #0c2840, var(--bg) 55%); color:var(--txt); font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; display:flex; flex-direction:column; align-items:center; gap:18px; padding:26px 20px; }
  h1 { font-size:1.1rem; margin:0; letter-spacing:.04em; }
  h1 b { color:var(--accent); }
  .sub { color:var(--muted); font-size:.74rem; margin:0; text-align:center; }
  .stage { position:relative; width:min(380px,86vw); aspect-ratio:1/1; border-radius:22px; border:1px solid var(--line); background:radial-gradient(circle at 50% 30%, #0e2233, #06121c 70%); box-shadow:0 24px 60px rgba(0,0,0,.5), inset 0 0 0 1px rgba(95,208,255,.06); overflow:hidden; }
  .stage canvas { width:100%; height:100%; display:block; }
  .badge { position:absolute; top:10px; left:12px; font-size:.62rem; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; }
  .badge.live { color:var(--ok); }
  .card { width:min(560px,100%); background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:18px 20px; box-shadow:0 24px 60px rgba(0,0,0,.5); }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  button { background:linear-gradient(180deg,#0e3550,#0a2335); color:var(--accent); border:1px solid #2a7fa6; border-radius:10px; padding:10px 16px; font-family:inherit; font-size:.84rem; font-weight:600; cursor:pointer; letter-spacing:.02em; }
  button:hover:not(:disabled) { border-color:var(--accent); box-shadow:0 0 14px rgba(95,208,255,.25); }
  button.alt { background:#06121c; color:var(--muted); border-color:var(--line); }
  button:disabled { opacity:.45; cursor:default; }
  label { display:block; font-size:.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin:14px 0 5px; }
  select, textarea { width:100%; background:#06121c; color:var(--txt); border:1px solid var(--line); border-radius:10px; padding:10px 12px; font-family:inherit; font-size:.86rem; }
  textarea { resize:vertical; min-height:54px; }
  .status { font-size:.74rem; margin-top:10px; min-height:18px; }
  .status.ok { color:var(--ok); } .status.warn { color:var(--warn); } .status.err { color:var(--err); }
  .answer { font-size:.96rem; line-height:1.5; margin-top:8px; }
  .hint { font-size:.66rem; color:var(--muted); }
  .meters { display:flex; gap:14px; margin-top:12px; font-size:.62rem; color:var(--muted); }
  .meter { flex:1; }
  .bar { height:6px; background:#06121c; border:1px solid var(--line); border-radius:4px; overflow:hidden; margin-top:3px; }
  .bar i { display:block; height:100%; width:0; background:var(--accent); }
  a { color:var(--accent); }
</style>
</head>
<body>
  <h1><b>DigitalAvatar</b>.ai · Laboratorio de lip-sync 2D</h1>
  <p class="sub">Motor offline en el navegador · la cara mueve la boca con el audio (ElevenLabs, micro o sintético). Cero coste, cero dependencias de red para animar.</p>

  <div class="stage">
    <span class="badge" id="badge">reposo</span>
    <canvas id="face"></canvas>
  </div>

  <div class="card">
    <div class="row">
      <button id="btnSynth">▶ Prueba sintética</button>
      <button id="btnMic" class="alt">🎤 Probar con micro</button>
      <button id="btnStop" class="alt" disabled>■ Parar</button>
    </div>

    <div class="meters">
      <div class="meter">apertura<div class="bar"><i id="mOpen"></i></div></div>
      <div class="meter">forma vocal<div class="bar"><i id="mSpread"></i></div></div>
      <div class="meter">voz<div class="bar"><i id="mVoiced"></i></div></div>
    </div>

    <label for="loc">Xpacio (punto real de Admira.app)</label>
    <select id="loc"><option value="">— cargando puntos… —</option></select>

    <label for="q">Pregunta al avatar (cerebro Grok + voz ElevenLabs)</label>
    <textarea id="q">¿Tenéis tabaco de liar?</textarea>

    <div class="row" style="margin-top:12px">
      <button id="btnAsk">🗣 Preguntar y hablar</button>
      <span class="hint">Usa el endpoint real <code>/metahuman/ask</code></span>
    </div>

    <div class="answer" id="answer"></div>
    <div class="status" id="status"></div>
  </div>

<script src="lipsync-avatar.js"></script>
<script>
const API = 'https://omnipublicity-api.csilvasantin.workers.dev';
const $ = id => document.getElementById(id);
const canvas = $('face');

const avatar = new LipSyncAvatar(canvas, { accent:'#5fd0ff' });
avatar.start();

let askAudio = null, synthSrc = null;

function setBadge(txt, live) { const b=$('badge'); b.textContent=txt; b.classList.toggle('live', !!live); }
function setStatus(msg, cls) { const s=$('status'); s.textContent=msg||''; s.className='status'+(cls?' '+cls:''); }

// Medidores en vivo (leen el estado del motor)
(function meters(){
  const o=$('mOpen'), s=$('mSpread'), v=$('mVoiced');
  function loop(){
    const a=avatar.audio;
    o.style.width=(a.open*100).toFixed(0)+'%';
    s.style.width=(a.spread*100).toFixed(0)+'%';
    v.style.width=(a.voiced*100).toFixed(0)+'%';
    requestAnimationFrame(loop);
  }
  loop();
})();

// ── Prueba sintética: balbuceo con cadencia de sílabas (offline, sin micro) ──
function playSynth() {
  stopAll();
  const ctx = avatar.ensureAudio();
  const dur = 3.4, sr = ctx.sampleRate;
  const buf = ctx.createBuffer(1, Math.floor(dur*sr), sr);
  const d = buf.getChannelData(0);
  let i = 0;
  while (i < d.length) {
    // Una sílaba: 120–260 ms con ataque/caída y vocal (formantes) variable.
    const len = Math.floor((0.12 + Math.random()*0.14) * sr);
    const gap = Math.floor((0.03 + Math.random()*0.07) * sr);
    const f0 = 110 + Math.random()*60;                 // tono
    const f1 = 500 + Math.random()*500;                // formante 1 (apertura)
    const f2 = 1200 + Math.random()*1800;              // formante 2 (anchura → spread)
    for (let j=0; j<len && i<d.length; j++, i++) {
      const t = j/sr, p = j/len;
      const env = Math.sin(Math.PI*p);                 // ataque/caída suave
      const s = 0.6*Math.sin(2*Math.PI*f0*t)
              + 0.5*Math.sin(2*Math.PI*f1*t)
              + 0.35*Math.sin(2*Math.PI*f2*t)
              + 0.08*(Math.random()*2-1);              // ruido (consonante)
      d[i] = s * env * 0.5;
    }
    i += gap; // silencio entre sílabas → boca se cierra
  }
  const src = ctx.createBufferSource();
  src.buffer = buf;
  avatar.connectSource(src, true);
  src.onended = () => { setBadge('reposo'); $('btnStop').disabled = true; };
  src.start();
  synthSrc = src;
  setBadge('hablando · sintético', true);
  $('btnStop').disabled = false;
  setStatus('Reproduciendo balbuceo sintético — mira la boca y los medidores.', 'ok');
}

// ── Micro ──
async function startMic() {
  stopAll();
  try {
    await avatar.connectMic();
    setBadge('escuchando · micro', true);
    $('btnStop').disabled = false;
    setStatus('Habla: la boca te sigue en tiempo real.', 'ok');
  } catch (e) {
    setStatus('No se pudo abrir el micro: ' + (e.message||e), 'err');
  }
}

function stopAll() {
  if (synthSrc) { try { synthSrc.stop(); } catch(e){} synthSrc=null; }
  if (askAudio) { try { askAudio.pause(); } catch(e){} }
  avatar.stopMic();
  setBadge('reposo');
  $('btnStop').disabled = true;
}

// ── Puntos reales desde el KV ──
fetch(API+'/locations',{cache:'no-store'}).then(r=>r.json()).then(d=>{
  const list=(d&&d.locations)||[]; const sel=$('loc'); sel.innerHTML='';
  if(!list.length){ sel.innerHTML='<option value="">(sin puntos en el KV)</option>'; return; }
  list.forEach(l=>{ const o=document.createElement('option'); o.value=l.id; o.textContent=(l.name||l.id)+(l.addr?' · '+l.addr:''); sel.appendChild(o); });
}).catch(()=>{ $('loc').innerHTML='<option value="">(error cargando puntos)</option>'; });

// ── Pregunta real → Grok + ElevenLabs → la cara lo dice ──
async function ask() {
  stopAll();
  const question = $('q').value.trim();
  if(!question){ setStatus('Escribe una pregunta.', 'warn'); return; }
  $('btnAsk').disabled = true; $('answer').textContent=''; setStatus('Pensando…');
  try {
    const res = await fetch(API+'/metahuman/ask', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ loc:$('loc').value, question, lang:'es', voice:true })
    });
    const j = await res.json().catch(()=>({}));
    if (j.ok) {
      $('answer').innerHTML = '🤖 ' + (j.answer||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
      if (j.audioBase64) {
        askAudio = new Audio('data:'+(j.mime||'audio/mpeg')+';base64,'+j.audioBase64);
        askAudio.crossOrigin = 'anonymous';
        avatar.connectAudioElement(askAudio);
        askAudio.onended = () => { setBadge('reposo'); $('btnStop').disabled=true; };
        await askAudio.play();
        setBadge('hablando · ElevenLabs', true); $('btnStop').disabled=false;
        setStatus('✓ Respuesta con voz — la cara hace lip-sync del MP3 real.', 'ok');
      } else {
        setStatus('Respuesta sin audio (¿voz desactivada o sin clave?).', 'warn');
      }
    } else if (j.error === 'xai_key_not_set') {
      setStatus('⚠️ Falta XAI_API_KEY en el worker (cerebro). El lip-sync ya funciona con la prueba sintética y el micro.', 'warn');
    } else {
      setStatus('❌ ' + (j.error || ('HTTP '+res.status)), 'err');
    }
  } catch(e) {
    setStatus('❌ Error de red: ' + (e.message||e), 'err');
  } finally { $('btnAsk').disabled = false; }
}

$('btnSynth').addEventListener('click', playSynth);
$('btnMic').addEventListener('click', startMic);
$('btnStop').addEventListener('click', stopAll);
$('btnAsk').addEventListener('click', ask);
</script>
</body>
</html>
